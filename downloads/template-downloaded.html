<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sample Contact Sheet</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.45;
        margin: 2rem;
      }
    </style>
  </head>
  <body>
    <p>Hello {{firstName}} {{lastName}},</p>

    <p>
      {{address}}<br />
      {{town}}, {{state}} {{zipCode}}
    </p>

    <p>Email: {{email}} • Phone: {{phoneNumber}}</p>
  </body>
</html>
