services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: simple-docs:latest
    container_name: simple-docs-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Node environment
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # Database (Supabase PostgreSQL)
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}

      # Authentication
      - JWT_SECRET=${JWT_SECRET}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}

      # Supabase Storage
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

      # Optional: Seed user credentials
      - SEED_USER_EMAIL=${SEED_USER_EMAIL:-u1@example.com}
      - SEED_USER_PASSWORD=${SEED_USER_PASSWORD:-devpass}

    volumes:
      # Mount code for development (comment out for production)
      # - .:/app
      # - /app/node_modules

      # LibreOffice temp directory (improves performance)
      - libreoffice-tmp:/tmp/libreoffice

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Security options
    security_opt:
      - no-new-privileges:true

    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  libreoffice-tmp:
