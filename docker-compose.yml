services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: simple-docs:latest
    container_name: simple-docs-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Node environment overrides (everything else from env_file)
      - NODE_ENV=production

    volumes:
      # Mount code for development (comment out for production)
      # - .:/app
      # - /app/node_modules

      # LibreOffice temp directory (improves performance)
      - libreoffice-tmp:/tmp/libreoffice

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Security options
    security_opt:
      - no-new-privileges:true

    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  libreoffice-tmp:
